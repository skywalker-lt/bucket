{% extends "base.html" %}
{% block title %}Login - CatVault{% endblock %}
{% block content %}
<div class="auth-card">
    <div id="status-msg" class="status-msg hidden"></div>

    {% if has_credentials %}
    <p>Authenticate with your passkey to access the vault.</p>
    <button id="btn-login" class="btn btn-primary">
        Login with Passkey
    </button>
    {% else %}
    <p>Welcome! Register a passkey to set up your vault.</p>
    <button id="btn-register" class="btn btn-primary">
        Register Passkey
    </button>
    {% endif %}
</div>
{% endblock %}
